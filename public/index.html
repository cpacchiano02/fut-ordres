<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>FUT Orders – Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-gray-100">

<!-- Header -->
<header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center">
  <h1 class="text-xl font-bold text-emerald-400">⚽ FUT Orders</h1>
  <span class="text-sm text-gray-400">Dashboard Admin</span>
</header>

<!-- Layout -->
<div class="flex">

  <!-- Sidebar -->
  <aside class="w-64 bg-gray-800 border-r border-gray-700 min-h-screen p-4">
    <nav class="space-y-2">
      <button onclick="showTab('dashboard')" class="nav-btn">📊 Dashboard</button>
      <button onclick="showTab('accounts')" class="nav-btn">👤 Accounts</button>
      <button onclick="showTab('orders')" class="nav-btn">📦 Ordini</button>
    </nav>
  </aside>

  <!-- Content -->
  <main class="flex-1 p-6">

    <!-- DASHBOARD -->
    <section id="dashboard" class="tab">
      <h2 class="text-2xl font-semibold mb-6">Dashboard</h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="card">
          <div class="label">Account attivi</div>
          <div id="stat-accounts" class="value">-</div>
        </div>
        <div class="card">
          <div class="label">Ordini totali</div>
          <div id="stat-orders" class="value">-</div>
        </div>
        <div class="card">
          <div class="label">Ordini in attesa</div>
          <div id="stat-pending" class="value">-</div>
        </div>
      </div>
    </section>

    <!-- ACCOUNTS -->
    <section id="accounts" class="tab hidden">
      <h2 class="text-2xl font-semibold mb-6">Accounts</h2>
      <div class="bg-gray-800 rounded-xl overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-700 text-gray-300 text-sm">
            <tr>
              <th class="px-4 py-3 text-left">Nome</th>
              <th class="px-4 py-3 text-left">Piattaforma</th>
              <th class="px-4 py-3 text-right">Crediti</th>
              <th class="px-4 py-3 text-center">Stato</th>
            </tr>
          </thead>
          <tbody id="accounts-table" class="divide-y divide-gray-700"></tbody>
        </table>
      </div>
    </section>

    <!-- ORDERS -->
    <section id="orders" class="tab hidden">
      <h2 class="text-2xl font-semibold mb-6">Ordini</h2>
      <div class="bg-gray-800 rounded-xl overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-700 text-gray-300 text-sm">
            <tr>
              <th class="px-4 py-3 text-left">Codice</th>
              <th class="px-4 py-3 text-left">Cliente</th>
              <th class="px-4 py-3 text-left">Piattaforma</th>
              <th class="px-4 py-3 text-right">Crediti</th>
              <th class="px-4 py-3 text-center">Stato</th>
            </tr>
          </thead>
          <tbody id="orders-table" class="divide-y divide-gray-700"></tbody>
        </table>
      </div>
    </section>

  </main>
</div>

<!-- Styles -->
<style>
  .nav-btn {
    width: 100%;
    text-align: left;
    padding: 10px 12px;
    border-radius: 8px;
    background: transparent;
    color: #d1d5db;
  }
  .nav-btn:hover {
    background: #1f2937;
  }
  .card {
    background: #1f2937;
    padding: 24px;
    border-radius: 16px;
  }
  .label {
    color: #9ca3af;
    font-size: 14px;
    margin-bottom: 8px;
  }
  .value {
    font-size: 32px;
    font-weight: bold;
    color: #34d399;
  }
</style>

<!-- Scripts -->
<script>
function showTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');

  if (id === 'dashboard') loadStats();
  if (id === 'accounts') loadAccounts();
  if (id === 'orders') loadOrders();
}

async function loadStats() {
  const res = await fetch('/api/stats');
  const d = await res.json();
  document.getElementById('stat-accounts').textContent = d.accounts;
  document.getElementById('stat-orders').textContent = d.orders;
  document.getElementById('stat-pending').textContent = d.pending;
}

async function loadAccounts() {
  const res = await fetch('/api/accounts');
  const data = await res.json();
  const tbody = document.getElementById('accounts-table');
  tbody.innerHTML = data.map(a => `
    <tr>
      <td class="px-4 py-3">${a.name}</td>
      <td class="px-4 py-3 uppercase">${a.platform}</td>
      <td class="px-4 py-3 text-right">${a.coin_balance.toLocaleString()}</td>
      <td class="px-4 py-3 text-center">
        <span class="px-2 py-1 rounded text-xs ${a.is_active ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'}">
          ${a.is_active ? 'Attivo' : 'Inattivo'}
        </span>
      </td>
    </tr>
  `).join('');
}

async function loadOrders() {
  const res = await fetch('/api/orders');
  const data = await res.json();
  const tbody = document.getElementById('orders-table');
  tbody.innerHTML = data.map(o => `
    <tr>
      <td class="px-4 py-3 font-mono">${o.order_code}</td>
      <td class="px-4 py-3">${o.customer_name}</td>
      <td class="px-4 py-3 uppercase">${o.platform}</td>
      <td class="px-4 py-3 text-right">${o.coins.toLocaleString()}</td>
      <td class="px-4 py-3 text-center">${o.status}</td>
    </tr>
  `).join('');
}

// init
showTab('dashboard');
</script>

</body>
</html>
