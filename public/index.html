<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">

<h1 class="text-2xl font-bold mb-6">Dashboard</h1>

<section class="mb-10">
  <h2 class="text-xl mb-3">📦 Ordini</h2>
  <div id="orders"></div>
</section>

<section>
  <h2 class="text-xl mb-3">📥 Richieste</h2>
  <div id="reservations"></div>
</section>

<script>
const pw = localStorage.getItem('pw');

async function load() {
  const orders = await fetch('/api/orders',{headers:{'x-admin-password':pw}}).then(r=>r.json());
  const resv = await fetch('/api/reservations',{headers:{'x-admin-password':pw}}).then(r=>r.json());

  ordersDiv.innerHTML = orders.map(o=>`
    <div class="mb-2 p-3 bg-gray-800 rounded">
      <b>${o.order_code}</b> – ${o.customer_name} – ${o.status}
      <div class="mt-2">
        ${['pending','processing','completed'].map(s=>`
          <button onclick="setOrder(${o.id},'${s}')" class="px-2 py-1 mr-1 bg-emerald-600">${s}</button>
        `).join('')}
      </div>
    </div>
  `).join('');

  reservations.innerHTML = resv.map(r=>`
    <div class="mb-2 p-3 bg-gray-800 rounded">
      <b>${r.customer_name}</b> (${r.platform}) – ${r.status}
      <div class="mt-2">
        ${['new','contacted','confirmed','closed'].map(s=>`
          <button onclick="setRes(${r.id},'${s}')" class="px-2 py-1 mr-1 bg-blue-600">${s}</button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

async function setOrder(id,status){
  await fetch('/api/orders/'+id+'/status',{
    method:'PUT',
    headers:{'Content-Type':'application/json','x-admin-password':pw},
    body:JSON.stringify({status})
  });
  load();
}

async function setRes(id,status){
  await fetch('/api/reservations/'+id+'/status',{
    method:'PUT',
    headers:{'Content-Type':'application/json','x-admin-password':pw},
    body:JSON.stringify({status})
  });
  load();
}

load();
</script>

</body>
</html>
