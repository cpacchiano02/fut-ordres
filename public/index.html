<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>FUT Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  https://cdn.tailwindcss.comscript>
</head>

<body class="bg-gray-900 text-white min-h-screen">

<!-- LOGIN -->
<section id="login" class="flex items-center justify-center min-h-screen">
  <div class="bg-gray-800 p-8 rounded-xl w-full max-w-sm">
    <h2 class="text-2xl font-bold mb-4 text-center">🔐 Login</h2>
    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 p-3 rounded bg-gray-700 outline-none">
    <button onclick="doLogin()"
      class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-semibold py-2 rounded">
      Entra
    </button>
  </div>
</section>

<!-- APP -->
<section id="app" class="hidden">

<header class="bg-gray-800 px-6 py-4 flex justify-between">
  <h1 class="font-bold text-emerald-400">⚽ FUT Orders</h1>
  <button onclick="logout()" class="text-sm text-gray-400">Logout</button>
</header>

<div class="flex">

<!-- MENU -->
<aside class="w-60 bg-gray-800 p-4 space-y-2">
  <button class="menu" onclick="showView('dashboard')">📊 Dashboard</button>
  <button class="menu" onclick="showView('orders')">📦 Ordini</button>
  <button class="menu" onclick="showView('requests')">📥 Richieste</button>
</aside>

<!-- CONTENT -->
<main class="flex-1 p-6">

<!-- DASHBOARD -->
<div id="dashboard" class="view">
  <h2 class="text-xl font-semibold mb-4">Dashboard</h2>
  <div class="grid grid-cols-3 gap-4">
    <div class="card">Ordini<br><span id="stat-orders">-</span></div>
    <div class="card">Pending<br><span id="stat-pending">-</span></div>
    <div class="card">Richieste<br><span id="stat-requests">-</span></div>
  </div>
</div>

<!-- ORDERS -->
<div id="orders" class="view hidden">
  <h2 class="text-xl font-semibold mb-4">Ordini</h2>
  <div id="ordersList"></div>
</div>

<!-- REQUESTS -->
<div id="requests" class="view hidden">
  <h2 class="text-xl font-semibold mb-4">Richieste</h2>
  <div id="requestsList"></div>
</div>

</main>
</div>
</section>

<style>
.menu{width:100%;text-align:left;padding:10px;border-radius:8px}
.menu:hover{background:#1f2937}
.card{background:#1f2937;padding:20px;border-radius:16px;font-size:18px}
.view{animation:fade .2s}
@keyframes fade{from{opacity:.7}to{opacity:1}}
</style>

<script>
const PW_KEY = 'admin_pw';

function doLogin(){
  localStorage.setItem(PW_KEY, document.getElementById('password').value);
  init();
}

function logout(){
  localStorage.removeItem(PW_KEY);
  location.reload();
}

function showView(id){
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');

  if(id==='orders') loadOrders();
  if(id==='requests') loadRequests();
}

async function api(url, method='GET', body){
  return fetch(url, {
    method,
    headers: {
      'Content-Type': 'application/json',
      'x-admin-password': localStorage.getItem(PW_KEY)
    },
    body: body ? JSON.stringify(body) : undefined
  }).then(r => r.json());
}

async function loadStats(){
  const s = await api('/api/stats');
  document.getElementById('stat-orders').textContent = s.orders;
  document.getElementById('stat-pending').textContent = s.pending;
  document.getElementById('stat-requests').textContent = s.reservations;
}

async function loadOrders(){
  const data = await api('/api/orders');
  document.getElementById('ordersList').innerHTML = data.map(o => `
    <div class="bg-gray-800 p-3 mb-2 rounded">
      <b>${o.order_code}</b> – ${o.customer_name} – ${o.status}
      <div class="mt-2">
        ${['pending','processing','completed'].map(s => `
          <button onclick="setOrder(${o.id}, '${s}')" class="px-2 py-1 bg-emerald-600 mr-1">${s}</button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

async function setOrder(id,status){
  await api('/api/orders/'+id+'/status','PUT',{status});
  loadOrders();
  loadStats();
}

async function loadRequests(){
  const data = await api('/api/reservations');
  document.getElementById('requestsList').innerHTML = data.map(r => `
    <div class="bg-gray-800 p-3 mb-2 rounded">
      <b>${r.customer_name}</b> (${r.platform}) – ${r.status}
      <div class="mt-2">
        ${['new','contacted','confirmed','closed'].map(s => `
          <button onclick="setRequest(${r.id}, '${s}')" class="px-2 py-1 bg-blue-600 mr-1">${s}</button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

async function setRequest(id,status){
  await api('/api/reservations/'+id+'/status','PUT',{status});
  loadRequests();
  loadStats();
}

function init(){
  if(localStorage.getItem(PW_KEY)){
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    loadStats();
  }
}

init();
</script>

</body>
</html>
