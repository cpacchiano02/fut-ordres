<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>FUT Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen">

<!-- LOGIN -->
<section id="login" class="flex items-center justify-center min-h-screen">
  <div class="bg-gray-800 p-8 rounded-xl w-full max-w-sm">
    <h2 class="text-2xl font-bold mb-4 text-center">Login</h2>
    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 p-3 rounded bg-gray-700">
    <button onclick="login()" class="w-full bg-emerald-500 text-black py-2 rounded">
      Entra
    </button>
  </div>
</section>

<section id="app" class="hidden">

<header class="bg-gray-800 px-6 py-4 flex justify-between">
  <h1 class="text-emerald-400 font-bold">FUT Orders</h1>
  <button onclick="logout()">Logout</button>
</header>

<div class="flex">

<aside class="w-64 bg-gray-800 p-4 space-y-2">
  <button onclick="show('dashboard')" class="menu">Dashboard</button>
  <button onclick="show('orders')" class="menu">Ordini</button>
  <button onclick="show('requests')" class="menu">Richieste</button>
</aside>

<main class="flex-1 p-6">

<!-- DASHBOARD -->
<div id="dashboard" class="view">
  <h2 class="text-xl mb-4">Dashboard</h2>
  <div class="grid grid-cols-3 gap-4">
    <div class="card">Ordini<br><span id="s-orders">-</span></div>
    <div class="card">Pending<br><span id="s-pending">-</span></div>
    <div class="card">Richieste<br><span id="s-req">-</span></div>
  </div>
</div>

<!-- ORDERS -->
<div id="orders" class="view hidden">
  <div class="flex justify-between mb-4">
    <h2 class="text-xl">Ordini</h2>
    <button onclick="toggleOrderForm()" class="bg-emerald-500 text-black px-3 py-1 rounded">
      + Nuovo Ordine
    </button>
  </div>

  <div id="orderForm" class="hidden bg-gray-800 p-4 rounded mb-4">
    <input id="o-name" placeholder="Cliente" class="w-full p-2 mb-2 bg-gray-700 rounded">
    <select id="o-platform" class="w-full p-2 mb-2 bg-gray-700 rounded">
      <option value="ps">PlayStation</option>
      <option value="xbox">Xbox</option>
      <option value="pc">PC</option>
    </select>
    <input id="o-coins" type="number" placeholder="Crediti" class="w-full p-2 mb-2 bg-gray-700 rounded">
    <button onclick="createOrder()" class="bg-emerald-500 text-black px-3 py-1 rounded">
      Crea
    </button>
  </div>

  <div id="ordersList"></div>
</div>

<!-- REQUESTS -->
<div id="requests" class="view hidden">
  <h2 class="text-xl mb-4">Richieste</h2>
  <div id="requestsList"></div>
</div>

</main>
</div>
</section>

<style>
.menu{width:100%;text-align:left;padding:10px;border-radius:8px}
.menu:hover{background:#1f2937}
.card{background:#1f2937;padding:20px;border-radius:16px}
.view{animation:fade .2s}
@keyframes fade{from{opacity:.7}to{opacity:1}}
</style>

<script>
const KEY='pw';

function login(){ localStorage.setItem(KEY,password.value); init(); }
function logout(){ localStorage.removeItem(KEY); location.reload(); }

function api(url,method='GET',body){
  return fetch(url,{
    method,
    headers:{
      'Content-Type':'application/json',
      'x-admin-password':localStorage.getItem(KEY)
    },
    body:body?JSON.stringify(body):undefined
  }).then(r=>r.json());
}

function show(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
