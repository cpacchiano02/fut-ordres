<!DOCTYPE html>
<html lang="it-scale=1"><html lang="it">

  <!-- ✅ Tailwind corretto -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen">

<!-- LOGIN -->
<div id="login" class="min-h-screen flex items-center justify-center">
  <div class="bg-gray-800 p-8 rounded-xl w-full max-w-sm">
    <h2 class="text-2xl font-bold mb-4 text-center">Login</h2>
    <input id="password" type="password" placeholder="Password"
      class="w-full p-3 mb-4 rounded bg-gray-700">
    <button onclick="doLogin()" class="w-full bg-emerald-500 text-black py-2 rounded">
      Entra
    </button>
    <p id="loginError" class="hidden text-red-400 mt-2 text-center">
      Password errata
    </p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header class="bg-gray-800 px-6 py-4 flex justify-between">
  <h1 class="font-bold text-emerald-400">Orders Manager</h1>
  <button onclick="logout()">Logout</button>
</header>

<div class="flex">

<aside class="w-64 bg-gray-800 p-4 space-y-2">
  <button onclick="show('dashboard')" class="menu">Dashboard</button>
  <button onclick="show('orders')" class="menu">Ordini</button>
  <button onclick="show('requests')" class="menu">Richieste</button>
</aside>

<main class="flex-1 p-6">

<!-- DASHBOARD -->
<div id="dashboard" class="view">
  <div class="grid grid-cols-3 gap-4">
    <div class="card">Ordini<br><span id="s-orders">-</span></div>
    <div class="card">Pending<br><span id="s-pending">-</span></div>
    <div class="card">Richieste<br><span id="s-req">-</span></div>
  </div>
</div>

<!-- ORDERS -->
<div id="orders" class="view hidden">
  <div class="flex justify-between mb-4">
    <button onclick="toggleForm()" class="bg-emerald-500 text-black px-3 py-1 rounded">
      + Nuovo ordine
    </button>
    <button onclick="deleteCompletedOrders()" class="bg-red-600 px-3 py-1 rounded">
      🧹 Pulisci completati
    </button>
  </div>

  <div id="orderForm" class="hidden bg-gray-800 p-4 rounded mb-4">
    <input id="o-name" placeholder="Cliente" class="w-full mb-2 p-2 bg-gray-700 rounded">
    <select id="o-platform" class="w-full mb-2 p-2 bg-gray-700 rounded">
      <option value="ps">PlayStation</option>
      <option value="xbox">Xbox</option>
      <option value="pc">PC</option>
    </select>
    <input id="o-coins" type="number" placeholder="Crediti"
      class="w-full mb-2 p-2 bg-gray-700 rounded">
    <button onclick="createOrder()" class="bg-emerald-500 text-black px-3 py-1 rounded">
      Crea
    </button>
  </div>

  <div id="ordersList"></div>
</div>

<!-- REQUESTS -->
<div id="requests" class="view hidden">
  <div id="requestsList"></div>
</div>

</main>
</div>
</div>

<style>
.menu{width:100%;text-align:left;padding:10px;border-radius:8px}
.menu:hover{background:#1f2937}
.card{background:#1f2937;padding:20px;border-radius:16px;font-size:20px}
.view{animation:fade .2s}
@keyframes fade{from{opacity:.7}to{opacity:1}}
</style>

<script>
const KEY='pw';

async function api(url,method='GET',body){
  const res = await fetch(url,{
    method,
    headers:{
      'Content-Type':'application/json',
      'x-admin-password':localStorage.getItem(KEY)
    },
    body:body?JSON.stringify(body):undefined
  });
  return res.json();
}

async function doLogin(){
  const res = await fetch('/api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:password.value})
  });
  if(!res.ok){loginError.classList.remove('hidden');return;}
  localStorage.setItem(KEY,password.value);
  init();
}

function logout(){localStorage.removeItem(KEY);location.reload();}

function show(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  if(id==='orders')loadOrders();
  if(id==='requests')loadRequests();
}

async function loadStats(){
  const s = await api('/api/stats');
  s-orders.textContent=s.orders;
  s-pending.textContent=s.pending;
  s-req.textContent=s.reservations;
}

function toggleForm(){orderForm.classList.toggle('hidden');}

async function createOrder(){
  await api('/api/orders','POST',{
    customer_name:o-name.value,
    platform:o-platform.value,
    coins:Number(o-coins.value)
  });
  orderForm.classList.add('hidden');
  loadOrders();loadStats();
}

async function loadOrders(){
  const data = await api('/api/orders');
  ordersList.innerHTML=data.map(o=>`
    <div class="bg-gray-800 p-3 mb-2 rounded">
      <b>${o.order_code}</b> – ${o.customer_name} – ${o.status}
      <div class="mt-2">
        ${['pending','processing','completed'].map(s=>`
          <button onclick="setStatus(${o.id},'${s}')" class="px-2 py-1 bg-emerald-600 mr-1">${s}</button>
        `).join('')}
        ${o.status==='completed'?`
          <button onclick="deleteOrder(${o.id})" class="px-2 py-1 bg-red-600 ml-2">Elimina</button>
        `:''}
      </div>
    </div>
  `).join('');
}

async function setStatus(id,status){
  await api('/api/orders/'+id+'/status','PUT',{status});
  loadOrders();loadStats();
}

async function deleteOrder(id){
  if(!confirm('Eliminare ordine completato?'))return;
  await api('/api/orders/'+id,'DELETE');
  loadOrders();loadStats();
}

async function deleteCompletedOrders(){
  if(!confirm('Eliminare TUTTI gli ordini completati?'))return;
  await api('/api/orders-completed','DELETE');
  loadOrders();loadStats();
}

async function loadRequests(){
  const data = await api('/api/reservations');
  requestsList.innerHTML=data.map(r=>`
    <div class="bg-gray-800 p-3 mb-2 rounded">
      <b>${r.customer_name}</b> (${r.platform})
      <button onclick="fromReq(${r.id})" class="ml-2 bg-emerald-500 text-black px-2 py-1 rounded">
        Crea ordine
      </button>
    </div>
  `).join('');
}

async function fromReq(id){
  await api('/api/reservations/'+id+'/create-order','POST');
  loadOrders();loadStats();loadRequests();
}

function init(){
  if(localStorage.getItem(KEY)){
    login.classList.add('hidden');
    app.classList.remove('hidden');
    loadStats();
  }
}

init();
</script>

</body>
</html>
<head>
  <meta charset="UTF-8">
  <title>Orders Manager</title>
