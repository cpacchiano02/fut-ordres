<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Richiesta Servizio</title>
  https://cdn.tailwindcss.comscript>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-2xl bg-gray-900 border border-gray-800 rounded-2xl shadow-xl p-8">
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-emerald-400 mb-2">Richiesta Servizio</h1>
      <p class="text-gray-400">
        Compila il modulo qui sotto per inviare una richiesta. Ti ricontatteremo il prima possibile.
      </p>
    </div>

    <form id="requestForm" class="space-y-5">
      <div>
        <label class="block text-sm text-gray-400 mb-2">Nome</label>
        <input
          type="text"
          name="customer_name"
          required
          class="w-full rounded-xl bg-gray-800 border border-gray-700 px-4 py-3 outline-none focus:border-emerald-500"
          placeholder="Il tuo nome"
        />
      </div>

      <div>
        <label class="block text-sm text-gray-400 mb-2">Contatto</label>
        <input
          type="text"
          name="contact"
          required
          class="w-full rounded-xl bg-gray-800 border border-gray-700 px-4 py-3 outline-none focus:border-emerald-500"
          placeholder="Telegram, WhatsApp o email"
        />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm text-gray-400 mb-2">Piattaforma</label>
          <select
            name="platform"
            required
            class="w-full rounded-xl bg-gray-800 border border-gray-700 px-4 py-3 outline-none focus:border-emerald-500"
          >
            <option value="">Seleziona</option>
            <option value="ps">PlayStation</option>
            <option value="xbox">Xbox</option>
            <option value="pc">PC</option>
          </select>
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-2">Quantità richiesta</label>
          <input
            type="number"
            name="quantity"
            required
            min="1"
            class="w-full rounded-xl bg-gray-800 border border-gray-700 px-4 py-3 outline-none focus:border-emerald-500"
            placeholder="Es. 1"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm text-gray-400 mb-2">Note</label>
        <textarea
          name="notes"
          rows="4"
          class="w-full rounded-xl bg-gray-800 border border-gray-700 px-4 py-3 outline-none focus:border-emerald-500"
          placeholder="Scrivi eventuali dettagli utili"
        ></textarea>
      </div>

      <button
        type="submit"
        class="w-full bg-emerald-500 hover:bg-emerald-600 transition rounded-xl py-3 font-semibold text-black"
      >
        Invia richiesta
      </button>
    </form>

    <div id="result" class="mt-6 hidden rounded-xl p-4 text-sm"></div>
  </div>

  <script>
    const form = document.getElementById('requestForm');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      data.quantity = Number(data.quantity);

      try {
        const res = await fetch('/api/reservations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const json = await res.json();

        if (!res.ok) {
          throw new Error(json.error || 'Errore durante l’invio');
        }

        result.className = 'mt-6 rounded-xl p-4 text-sm bg-emerald-900 text-emerald-200';
        result.textContent = 'Richiesta inviata con successo. Ti ricontatteremo presto.';
        result.classList.remove('hidden');
        form.reset();
      } catch (err) {
        result.className = 'mt-6 rounded-xl p-4 text-sm bg-red-900 text-red-200';
        result.textContent = err.message || 'Si è verificato un errore.';
        result.classList.remove('hidden');
      }
    });
  </script>

</body>
</html>
